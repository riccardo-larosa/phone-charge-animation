<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Charging</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: radial-gradient(ellipse at center bottom, rgba(0, 229, 255, 0.15) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        #hud {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #ring-container {
            position: relative;
            width: 200px;
            height: 200px;
        }

        #ring {
            width: 100%;
            height: 100%;
        }

        #ring-progress {
            transition: stroke-dashoffset 1s ease;
            filter: drop-shadow(0 0 6px rgba(0, 229, 255, 0.5));
        }

        #percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 48px;
            font-weight: 200;
            letter-spacing: -2px;
        }

        #stats {
            display: flex;
            gap: 48px;
            margin-top: 32px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            color: #00e5ff;
            font-size: 24px;
            font-weight: 300;
        }

        .stat-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div id="hud">
        <div id="ring-container">
            <svg id="ring" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="85" fill="none" stroke="#1a1a2e" stroke-width="8"/>
                <circle id="ring-progress" cx="100" cy="100" r="85" fill="none" stroke="#00e5ff" stroke-width="8"
                    stroke-linecap="round" stroke-dasharray="534" stroke-dashoffset="534"
                    transform="rotate(-90 100 100)"/>
            </svg>
            <div id="percentage">--%</div>
        </div>
        <div id="stats">
            <div class="stat">
                <span class="stat-value" id="watts-value">--</span>
                <span class="stat-label">watts</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="time-value">--</span>
                <span class="stat-label">until full</span>
            </div>
        </div>
    </div>
    <script>
        // --- URL Parameter Parsing ---
        function getParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                level: params.has('level') ? parseInt(params.get('level'), 10) : null,
                watts: params.has('watts') ? parseFloat(params.get('watts')) : null,
                timeLeft: params.has('timeLeft') ? parseInt(params.get('timeLeft'), 10) : null,
            };
        }

        const batteryData = getParams();

        // --- HUD Update ---
        function updateHUD(data) {
            const pctEl = document.getElementById('percentage');
            pctEl.textContent = data.level !== null ? `${data.level}%` : '--%';

            const ring = document.getElementById('ring-progress');
            const circumference = 534;
            const offset = data.level !== null
                ? circumference - (circumference * data.level / 100)
                : circumference;
            ring.style.strokeDashoffset = offset;

            const wattsEl = document.getElementById('watts-value');
            wattsEl.textContent = data.watts !== null ? `${data.watts}W` : '--';

            const timeEl = document.getElementById('time-value');
            if (data.timeLeft !== null) {
                if (data.timeLeft >= 60) {
                    const hrs = Math.floor(data.timeLeft / 60);
                    const mins = data.timeLeft % 60;
                    timeEl.textContent = mins > 0 ? `${hrs}h ${mins}m` : `${hrs}h`;
                } else {
                    timeEl.textContent = `${data.timeLeft}m`;
                }
            } else {
                timeEl.textContent = '--';
            }
        }

        updateHUD(batteryData);

        // --- Particle System ---
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const particles = [];
        const MAX_PARTICLES = 150;

        function targetCount() {
            if (batteryData.watts === null) return 60;
            return Math.min(MAX_PARTICLES, Math.max(20, Math.round(batteryData.watts * 4)));
        }

        function createParticle() {
            const w = canvas.width;
            const h = canvas.height;
            return {
                x: Math.random() * w,
                y: h + Math.random() * 20,
                vx: (Math.random() - 0.5) * 1.5,
                vy: -(1.5 + Math.random() * 3),
                size: 1 + Math.random() * 2.5,
                life: 0,
                maxLife: 60 + Math.random() * 80,
                hue: 180 + Math.random() * 20,
            };
        }

        function updateParticles() {
            const target = targetCount();
            while (particles.length < target) {
                particles.push(createParticle());
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life++;
                p.x += p.vx + (Math.random() - 0.5) * 0.5;
                p.y += p.vy;
                p.vy *= 0.995;
                if (p.life > p.maxLife || p.y < -10) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const p of particles) {
                const alpha = 1 - (p.life / p.maxLife);
                const glow = p.size * 3;
                ctx.beginPath();
                ctx.arc(p.x, p.y, glow, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${alpha * 0.15})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 100%, 80%, ${alpha * 0.9})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 50%, 95%, ${alpha})`;
                ctx.fill();
            }
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }

        animate();

        // --- Wake Lock (keep screen on) ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    await navigator.wakeLock.request('screen');
                }
            } catch (e) {
                // Wake lock not supported or denied
            }
        }
        requestWakeLock();
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') requestWakeLock();
        });
    </script>
</body>
</html>
